<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modal Screenshot</title>
<style>
html,body{height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f4f5f7;overflow:hidden}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62)}
.geschenkeliste-modal {display:block;position: fixed;inset: 0;z-index: 100000;overflow: auto;background-color: rgba(0,0,0,0.7);}
.modal-content {background-color: #fefefe;margin: 8% auto;padding: 30px;border: 1px solid #888;width: 90%;max-width: 500px;border-radius: 8px;position: relative;box-shadow:0 20px 55px rgba(0,0,0,.35)}
.close-modal {color: #aaa;position: absolute;right: 20px;top: 15px;font-size: 28px;font-weight: bold;}
.modal-content h3 {margin-top: 0;margin-bottom: 10px;font-size:28px}
.form-group {margin-bottom: 20px;}
.form-group label {display: block;margin-bottom: 5px;font-weight: 600;color: #333;}
.form-control {width: 100%;padding: 10px;border: 1px solid #ddd;border-radius: 4px;font-size: 1em;box-sizing: border-box;}
.form-actions {display: flex;gap: 10px;margin-top: 25px;}
.button-primary {background: #0073aa;color: #fff;border: none;padding: 12px 24px;border-radius: 5px;font-size: 1em;font-weight: 600;}
.button-secondary{background:#f6f7f7;color:#2c3338;border:1px solid #dcdcde;padding:12px 24px;border-radius:5px}
</style>
</head>
<body>
<div class="geschenkeliste-modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h3>Geschenk reservieren</h3>
    <p>Bitte gebt eure Kontaktdaten ein, damit wir euch zuordnen können:</p>
    <form>
      <div class="form-group">
        <label for="reserve_name">Name (optional)</label>
        <input type="text" id="reserve_name" class="form-control" value="Max Mustermann">
      </div>
      <div class="form-group">
        <label for="reserve_email">E-Mail-Adresse *</label>
        <input type="email" id="reserve_email" class="form-control" value="max@example.de">
      </div>
      <div class="form-actions">
        <button class="button-primary" type="button">Jetzt reservieren</button>
        <button class="button-secondary" type="button">Abbrechen</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
